version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
      - qdrant

  redis:
    image: redis

  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatbot

  qdrant:
    image: qdrant/qdrant

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"