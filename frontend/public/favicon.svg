<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Bot head shape -->
  <rect x="16" y="20" width="32" height="24" rx="6" fill="white" opacity="0.95"/>
  <!-- Antenna -->
  <rect x="30" y="12" width="4" height="10" rx="2" fill="white" opacity="0.9"/>
  <circle cx="32" cy="11" r="3.5" fill="white"/>
  <!-- Eyes -->
  <circle cx="24" cy="31" r="3.5" fill="url(#g2)"/>
  <circle cx="40" cy="31" r="3.5" fill="url(#g2)"/>
  <!-- Eye shine -->
  <circle cx="25.2" cy="29.8" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="41.2" cy="29.8" r="1.2" fill="white" opacity="0.8"/>
  <!-- Mouth -->
  <rect x="24" y="37" width="16" height="3" rx="1.5" fill="url(#g2)" opacity="0.7"/>
  <!-- Bottom connector -->
  <rect x="22" y="44" width="20" height="4" rx="2" fill="white" opacity="0.5"/>
</svg>
