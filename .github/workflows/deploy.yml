name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t chatbot:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker tag chatbot:latest ${{ secrets.DOCKER_USERNAME }}/chatbot:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/chatbot:latest

      - name: Deploy to Kubernetes
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/chatbot-backend backend=${{ secrets.DOCKER_USERNAME }}/chatbot:latest
          kubectl rollout status deployment/chatbot-backend